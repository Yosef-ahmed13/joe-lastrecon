name: ✨ Setup & Check Secrets

on:
  workflow_dispatch:

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: 🔐 Check Required Secrets
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOK: ${{ secrets.GH_TOKEN }}
        run: |
          echo "## 🔐 Secrets Verification" >> $GITHUB_STEP_SUMMARY
          
          check_secret() {
            if [[ -n "$2" ]]; then
              echo "- $1: ✅ Set" >> $GITHUB_STEP_SUMMARY
            else
              echo "- $1: ❌ Missing! Please add it in Settings -> Secrets" >> $GITHUB_STEP_SUMMARY
            fi
          }
          
          check_secret "TELEGRAM_BOT_TOKEN" "$TG_BOT"
          check_secret "TELEGRAM_CHAT_ID" "$TG_CHAT"
          check_secret "GH_TOKEN" "$GH_TOK"
          
          if [[ -z "$TG_BOT" || -z "$TG_CHAT" || -z "$GH_TOK" ]]; then
            echo "::error::Required secrets are missing!"
            exit 1
          else
            echo "🎉 All required secrets are configured correctly!"
          fi
